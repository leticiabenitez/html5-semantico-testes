<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Mídia</title>
    </head>
    <body>

        <h2>< img ></h2>
        <img src="imagem.jpg" alt="paisagem" width="300">

        <h2>< figure > e < figcaption ></h2>
        <figure>
            <img src="pinguins.jpg" alt="pinguins" width="300">
            <figcaption>Legenda da figura</figcaption>
        </figure>

        <h2>< picture > e < source ></h2>
        <picture>
            <source media="(max-width: 600px)" srcset="imagem-pequena.jpg">
            <source media="(max-width: 1200px)" srcset="imagem-media.jpg">
            <img src="imagem-grande.jpg" alt="imagem responsiva" width="300">
        </picture>

        <br><br>
        <h2>Áudio</h2>
        <audio controls>
            <source src="audio.mp3" type="audio/mpeg">
        </audio>

        <h2>Vídeo</h2>
        <video controls width="400">
            <source src="video.mp4" type="video/mp4">
        </video>

        <br><br>
        <h2>Iframe (outra página)</h2>
        <iframe src="https://www.sp.senai.br/" width="400" height="200"></iframe>

        <h2>Embed (conteúdo externo)</h2>
        <embed src="arquivo.pdf" width="400" height="200">

        <h2>Object + Param</h2>
        <object data="arquivo.pdf" width="400" height="200">
            <param name="autoplay" value="true">
        </object>
        <br><br>
    </body>
</html>
